<!DOCTYPE html>
<html lang="id" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SPK Draft Pick MLBB — AHP-SAW{% endblock %}</title>
  <meta name="description" content="Sistem Pendukung Keputusan Pemilihan Hero MLBB menggunakan AHP-SAW">
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand">
        <div class="logo-icon">M</div>
        <span><span class="accent">Mobile Legends Bang Bang</span></span>
      </a>
      <div class="navbar-right">
        <ul class="navbar-links">
          <li><a href="/" {% if request.path=='/' %}class="active" {% endif %}>Draft Pick</a></li>
          {% if is_admin %}
          <li><a href="/ahp" {% if request.path=='/ahp' %}class="active" {% endif %}>Bobot AHP</a></li>
          <li><a href="/heroes" {% if request.path=='/heroes' %}class="active" {% endif %}>Data Hero</a></li>
          <li><a href="/admin" {% if request.path=='/admin' %}class="active" {% endif %}>Admin</a></li>
          <li><a href="/logout" class="nav-logout">Logout</a></li>
          {% else %}
          <li><a href="/login" {% if request.path=='/login' %}class="active" {% endif %}>Admin</a></li>
          {% endif %}
        </ul>
        <button class="theme-toggle" onclick="toggleTheme()" title="Ganti tema" id="themeBtn" aria-label="Toggle theme">
          <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
          </svg>
        </button>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="footer">
    SPK Draft Pick MLBB — AHP-SAW &copy; 2026 | Skripsi
  </footer>

  <script>
    const ICON_SUN = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';
    const ICON_MOON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    function setThemeIcon(theme) {
      const el = document.getElementById('themeIcon');
      if (el) el.outerHTML = theme === 'dark' ? ICON_MOON : ICON_SUN;
    }
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('spk_theme', next);
      setThemeIcon(next);
    }
    (function () {
      const saved = localStorage.getItem('spk_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      document.addEventListener('DOMContentLoaded', () => setThemeIcon(saved));
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>

</html>
