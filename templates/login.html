{% extends "base.html" %}
{% block title %}Admin Login — SPK MLBB{% endblock %}
{% block content %}
<main class="main-content" style="display:flex;align-items:center;justify-content:center;min-height:80vh">
  <div class="card" style="width:100%;max-width:420px;padding:2.5rem">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="width:60px;height:60px;background:linear-gradient(135deg,#f0b429,#ffd666);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-family:Orbitron;font-weight:900;font-size:24px;color:#050a18;margin-bottom:12px">A</div>
      <h1 style="font-family:Orbitron;font-size:1.3rem;font-weight:800;color:var(--accent-gold);letter-spacing:2px">ADMIN LOGIN</h1>
      <p style="color:var(--text-muted);font-size:.82rem;margin-top:4px">SPK Draft Pick MLBB — AHP-SAW</p>
    </div>
    <form method="POST" action="/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Masukkan username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Masukkan password" required style="background:var(--bg-input);border:1px solid var(--border-color);color:var(--text-primary);padding:10px 14px;border-radius:8px;width:100%;font-size:.9rem;outline:none">
      </div>
      {% if error %}
      <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:.82rem;color:#ef4444">{{ error }}</div>
      {% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%">LOGIN</button>
    </form>
    <div style="text-align:center;margin-top:1.5rem;font-size:.72rem;color:var(--text-muted)">Default: admin / admin123</div>
  </div>
</main>
{% endblock %}
