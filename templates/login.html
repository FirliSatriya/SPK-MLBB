{% extends "base.html" %}
{% block title %}Admin Login — SPK MLBB{% endblock %}
{% block content %}
<main class="main-content" style="display:flex;align-items:center;justify-content:center;min-height:78vh">
  <div class="card" style="width:100%;max-width:400px;padding:2.25rem">
    <div style="text-align:center;margin-bottom:1.75rem">
      <div
        style="width:64px;height:64px;background:var(--gradient-gold);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-family:Orbitron;font-weight:900;font-size:24px;color:#0c1220;margin-bottom:14px;box-shadow:var(--shadow-gold)">
        A</div>
      <h1 style="font-family:Orbitron;font-size:1.2rem;font-weight:800;color:var(--accent-gold);letter-spacing:2.5px">
        ADMIN LOGIN</h1>
      <p style="color:var(--text-muted);font-size:.78rem;margin-top:4px">SPK Draft Pick MLBB — AHP-SAW</p>
    </div>
    <form method="POST" action="/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Masukkan username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Masukkan password" required>
      </div>
      {% if error %}
      <div
        style="background:var(--accent-red-soft);border:1px solid var(--accent-red);border-radius:8px;padding:9px 12px;margin-bottom:1rem;font-size:.8rem;color:var(--accent-red)">
        {{ error }}</div>
      {% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%">LOGIN</button>
    </form>
    <div style="text-align:center;margin-top:1.25rem;font-size:.7rem;color:var(--text-muted)"></div>
  </div>
</main>
{% endblock %}
